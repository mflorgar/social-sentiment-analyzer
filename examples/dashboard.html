<title>Social Sentiment Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #FAFAF9;
    --card-bg: #FFFFFF;
    --card-border: #EAEAE7;
    --text: #2A2A2A;
    --muted: #6B6B6B;
    --accent: #5B6B5B;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 32px 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue",
                 Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.45;
  }
  .container {
    max-width: 1080px;
    margin: 0 auto;
  }
  header {
    margin-bottom: 24px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .meta {
    color: var(--muted);
    font-size: 12px;
  }
  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin: 20px 0 24px;
  }
  .kpi {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 14px 16px;
  }
  .kpi-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
  }
  .kpi-value {
    font-size: 24px;
    font-weight: 600;
  }
  .kpi-suffix {
    font-size: 14px;
    font-weight: 500;
    margin-left: 2px;
  }
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .chart-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 6px;
    overflow: hidden;
  }
  .chart-card .plotly-graph-div { width: 100% !important; }
  @media (max-width: 760px) {
    .kpi-grid { grid-template-columns: repeat(2, 1fr); }
    .chart-grid { grid-template-columns: 1fr; }
  }
  footer {
    margin-top: 28px;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
  }
</style>
</head>
